<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrices — Versión Cliente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      color: #2c2c2a;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 20px;
      background: #EEEDFE;
      color: #534AB7;
      margin-bottom: 2rem;
    }
    .card {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: #444441;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    label {
      font-size: 14px;
      color: #5f5e5a;
    }
    input[type="number"] {
      width: 70px;
      padding: 6px 10px;
      border: 0.5px solid #b4b2a9;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #2c2c2a;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px #EEEDFE;
    }
    button {
      padding: 8px 20px;
      border: 0.5px solid #b4b2a9;
      border-radius: 8px;
      background: #fff;
      color: #2c2c2a;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #f1efe8; }
    button.primary {
      background: #534AB7;
      color: #fff;
      border-color: #534AB7;
    }
    button.primary:hover { background: #3C3489; }
    .matrices-container {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .matrix-block h3 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #534AB7;
    }
    .matrix-grid {
      display: grid;
      gap: 4px;
    }
    .matrix-grid input {
      width: 56px;
      height: 40px;
      text-align: center;
      border: 0.5px solid #b4b2a9;
      border-radius: 6px;
      font-size: 14px;
      padding: 0;
      background: #fff;
      color: #2c2c2a;
    }
    .matrix-grid input:focus {
      outline: none;
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px #EEEDFE;
    }
    .matrix-grid input.error {
      border-color: #E24B4A;
      background: #FCEBEB;
    }
    .op-selector {
      display: flex;
      gap: 8px;
    }
    .op-selector button {
      flex: 1;
    }
    .op-selector button.active {
      background: #534AB7;
      color: #fff;
      border-color: #534AB7;
    }
    .result-grid {
      display: grid;
      gap: 4px;
    }
    .result-cell {
      width: 56px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #E1F5EE;
      border: 0.5px solid #5DCAA5;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #085041;
    }
    .error-msg {
      font-size: 13px;
      color: #A32D2D;
      margin-top: 8px;
      padding: 8px 12px;
      background: #FCEBEB;
      border-radius: 8px;
      border-left: 3px solid #E24B4A;
    }
    .sym {
      font-size: 1.5rem;
      color: #888780;
      display: flex;
      align-items: center;
      padding-top: 24px;
    }
    #section-operacion { display: none; }
    #section-resultado { display: none; }
  </style>
</head>
<body>

<h1>Operaciones con matrices</h1>
<span class="badge">Versión cliente — sin servidor</span>

<div class="card">
  <h2>1. Definir dimensiones</h2>
  <div class="row">
    <label>Filas:</label>
    <input type="number" id="filas" min="1" max="6" value="2">
    <label>Columnas:</label>
    <input type="number" id="cols" min="1" max="6" value="2">
    <button onclick="generarMatrices()">Generar matrices</button>
  </div>
  <div id="dim-error" class="error-msg" style="display:none;"></div>
</div>

<div class="card" id="section-matrices" style="display:none;">
  <h2>2. Cargar valores</h2>
  <div class="matrices-container">
    <div class="matrix-block">
      <h3>Matriz A</h3>
      <div class="matrix-grid" id="grid-a"></div>
    </div>
    <div class="sym">+/×</div>
    <div class="matrix-block">
      <h3>Matriz B</h3>
      <div class="matrix-grid" id="grid-b"></div>
    </div>
  </div>
</div>

<div class="card" id="section-operacion">
  <h2>3. Elegir operación</h2>
  <div class="op-selector" style="max-width:300px;">
    <button id="btn-suma" class="active" onclick="setOp('suma')">Suma</button>
    <button id="btn-mult" onclick="setOp('multiplicacion')">Multiplicación</button>
  </div>
  <div style="margin-top:1rem;">
    <button class="primary" onclick="calcular()">Calcular →</button>
  </div>
  <div id="op-error" class="error-msg" style="display:none;"></div>
</div>

<div class="card" id="section-resultado">
  <h2>4. Resultado</h2>
  <div class="matrices-container" id="resultado-container"></div>
</div>

<script>
  let filas = 2, cols = 2, operacion = 'suma';

  function generarMatrices() {
    const f = parseInt(document.getElementById('filas').value);
    const c = parseInt(document.getElementById('cols').value);
    const errDiv = document.getElementById('dim-error');

    if (!f || !c || f < 1 || c < 1 || f > 6 || c > 6) {
      errDiv.textContent = 'Las dimensiones deben ser números entre 1 y 6.';
      errDiv.style.display = 'block';
      return;
    }
    errDiv.style.display = 'none';
    filas = f; cols = c;

    construirGrid('grid-a', f, c, 'a');
    construirGrid('grid-b', f, c, 'b');

    document.getElementById('section-matrices').style.display = 'block';
    document.getElementById('section-operacion').style.display = 'block';
    document.getElementById('section-resultado').style.display = 'none';
  }

  function construirGrid(id, f, c, prefijo) {
    const grid = document.getElementById(id);
    grid.style.gridTemplateColumns = `repeat(${c}, 56px)`;
    grid.innerHTML = '';
    for (let i = 0; i < f; i++) {
      for (let j = 0; j < c; j++) {
        const inp = document.createElement('input');
        inp.type = 'number';
        inp.id = `${prefijo}_${i}_${j}`;
        inp.placeholder = '0';
        inp.step = 'any';
        grid.appendChild(inp);
      }
    }
  }

  function setOp(op) {
    operacion = op;
    document.getElementById('btn-suma').classList.toggle('active', op === 'suma');
    document.getElementById('btn-mult').classList.toggle('active', op === 'multiplicacion');
  }

  function leerMatriz(prefijo, f, c) {
    const mat = [];
    let errores = false;
    for (let i = 0; i < f; i++) {
      mat[i] = [];
      for (let j = 0; j < c; j++) {
        const inp = document.getElementById(`${prefijo}_${i}_${j}`);
        const val = inp.value.trim();
        if (val === '' || isNaN(Number(val))) {
          inp.classList.add('error');
          errores = true;
        } else {
          inp.classList.remove('error');
          mat[i][j] = Number(val);
        }
      }
    }
    return errores ? null : mat;
  }

  function calcular() {
    const errDiv = document.getElementById('op-error');
    errDiv.style.display = 'none';

    const matA = leerMatriz('a', filas, cols);
    const matB = leerMatriz('b', filas, cols);

    if (!matA || !matB) {
      errDiv.textContent = 'Por favor completá todos los campos con valores numéricos.';
      errDiv.style.display = 'block';
      return;
    }

    let resultado;
    if (operacion === 'suma') {
      resultado = sumar(matA, matB);
    } else {
      if (cols !== filas) {
        errDiv.textContent = `Para multiplicar, las columnas de A (${cols}) deben ser iguales a las filas de B (${filas}). En este caso ambas matrices son ${filas}×${cols}.`;
        errDiv.style.display = 'block';
        return;
      }
      resultado = multiplicar(matA, matB);
    }

    mostrarResultado(resultado);
  }

  function sumar(a, b) {
    return a.map((fila, i) => fila.map((val, j) => val + b[i][j]));
  }

  function multiplicar(a, b) {
    const f = a.length, c = b[0].length, n = b.length;
    const res = Array.from({length: f}, () => Array(c).fill(0));
    for (let i = 0; i < f; i++)
      for (let j = 0; j < c; j++)
        for (let k = 0; k < n; k++)
          res[i][j] += a[i][k] * b[k][j];
    return res;
  }

  function mostrarResultado(mat) {
    const opLabel = operacion === 'suma' ? 'A + B' : 'A × B';
    const container = document.getElementById('resultado-container');
    const cols = mat[0].length;

    let html = `<div class="matrix-block"><h3>${opLabel}</h3><div class="result-grid" style="grid-template-columns:repeat(${cols},56px);">`;
    for (const fila of mat)
      for (const val of fila)
        html += `<div class="result-cell">${parseFloat(val.toFixed(4))}</div>`;
    html += '</div></div>';

    container.innerHTML = html;
    document.getElementById('section-resultado').style.display = 'block';
  }
</script>
</body>
</html>
